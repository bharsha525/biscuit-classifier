<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Biscuit Wrapper Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: 'Trebuchet MS', Arial, sans-serif;
            background: linear-gradient(135deg, #fbe9d7, #fff8f0);
            margin: 0;
            padding: 40px;
            color: #4a2c2a;
        }
        h1 {
            text-align: center;
            color: #8b4513;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 1px 1px #f0d9b5;
        }
        p.description {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 30px;
            font-size: 1.1em;
            color: #5c3d2e;
        }
        .drop-zone {
            width: 320px;
            height: 220px;
            border: 3px dashed #d2691e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b4226;
            margin: 20px auto;
            cursor: pointer;
            background-color: #fff8e7;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }
        .drop-zone.dragover {
            background-color: #ffe4b5;
        }
        #preview {
            margin-top: 20px;
            text-align: center;
        }
        #preview img {
            max-width: 300px;
            border-radius: 8px;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.2);
        }
        .result {
            margin-top: 25px;
            text-align: center;
            font-weight: bold;
            color: #6b4226;
            font-size: 1.2em;
            background-color: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>Biscuit Wrapper Classifier</h1>
    <p class="description">
        Upload or drag‑and‑drop a biscuit wrapper image below.  
        Our AI will recognize the brand and type of biscuit from its packaging.
    </p>

    <!-- Drag and Drop Zone -->
    <div class="drop-zone" id="drop-zone">
        🍪 Drag & Drop an Image Here
    </div>

    <!-- Hidden Form -->
    <form id="upload-form" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" id="file-input" accept="image/*" hidden>
        <input type="submit" value="Predict" style="display:none;">
    </form>

    <!-- Preview -->
    <div id="preview"></div>

    <!-- Prediction Result -->
    {% if prediction %}
    <div class="result">
        Predicted Wrapper: {{ prediction }}
    </div>
    {% endif %}

    <script>
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const preview = document.getElementById("preview");

        dropZone.addEventListener("click", () => fileInput.click());

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                showPreview(file);
                document.getElementById("upload-form").submit();
            }
        });

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];
            if (file) {
                showPreview(file);
                document.getElementById("upload-form").submit();
            }
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
